<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Student Login Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#007BFF);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:25px;
    font-size:22px;
}

input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#007BFF;
}

button{
    width:100%;
    padding:13px;
    margin-top:10px;
    background:#007BFF;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.forgot{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#007BFF;
    font-size:15px;
}

.forgot:hover{
    text-decoration:underline;
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#555;
}
</style>

</head>
<body>

<div class="container">

  <img src="1697346843915.jpeg" alt="College Logo" class="logo">
    <h2>Student Login</h2>

    <form>
        <input type="text" placeholder="Student ID" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <a href="#" class="forgot">Forgot Password?</a>
    </form>
<img src="images/1697346843915.jpg" alt="College Logo" class="logo">
    <div class="footer">
        APEC Student Login Portal
    </div>

</div>

</body>
</html>
