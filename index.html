<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#007BFF);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:350px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
    display:block;
    margin-left:auto;
    margin-right:auto;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

.footer{
    margin-top:15px;
    color:#666;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

    <img src="1697346843915.jpeg" class="logo" alt="College Logo">

    <h2>Student Login</h2>

    <form>
        <input type="text" placeholder="Student ID" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        APEC Student Login Portal
    </div>

</div>

</body>
</html>
